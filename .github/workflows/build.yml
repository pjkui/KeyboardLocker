name: Build Windows EXE

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write   # Release 需要

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Generate app icon
        run: python build_icon.py

      - name: Verify version.py matches tag (only for tag builds)
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}" -replace '^v',''
          $code = python -c "from version import __version__; print(__version__)"
          $code = $code.Trim()
          Write-Host "tag version  = $tag"
          Write-Host "code version = $code"
          if ($tag -ne $code) {
            Write-Error "version.py (__version__=$code) does not match git tag (v$tag). Please bump version.py and re-tag."
            exit 1
          }

      - name: Build KeyboardLocker.exe (tray, UAC admin)
        run: >
          pyinstaller
          --noconfirm --clean
          --onefile --windowed
          --name KeyboardLocker
          --icon app.ico
          --uac-admin
          --hidden-import=PIL._tkinter_finder
          tray_app.py

      - name: Build keyboard_lock.exe (CLI)
        run: >
          pyinstaller
          --noconfirm --clean
          --onefile --console
          --name keyboard_lock
          --icon app.ico
          --uac-admin
          keyboard_lock.py

      - name: Collect artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Copy-Item dist/KeyboardLocker.exe release/
          Copy-Item dist/keyboard_lock.exe release/
          Copy-Item README.md release/
          Copy-Item requirements.txt release/
          Get-ChildItem release | Format-Table Name, Length

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: KeyboardLocker-windows-x64
          path: release/
          retention-days: 7

      - name: Package zip for release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}"
          $zip = "KeyboardLocker-$ver-windows-x64.zip"
          Compress-Archive -Path release/* -DestinationPath $zip
          echo "ZIP_PATH=$zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.ZIP_PATH }}
            release/KeyboardLocker.exe
            release/keyboard_lock.exe
          generate_release_notes: true
